spring.application.name=onlineresearcher
server.port=8080

# Read research topics interactively from the terminal (stdin). Disabled automatically in tests.
researcher.terminal.enabled=true

# Default cap on the number of tokens generated per model response when a request does not override it.
prompt.max-tokens=1024

# Conversation memory. Each prompt is sent with the context of earlier turns in the session. When the
# assembled request (system + summary + prior turns + new prompt) plus the reserved response space would
# exceed memory.max-tokens, the oldest turns are folded into a running summary (Claude Code-style
# auto-compaction). This guarantees the user prompt + memory stay below memory.max-tokens at all times.
# The model used here (qwen2.5-3b-instruct, same as roleflow) tops out around 8100 usable tokens, so the
# budget is set to 8100.
memory.max-tokens=8100
# Approximate characters per token, used for local size estimation (~4 for English text).
memory.chars-per-token=4
# Cap on the length of a generated summary when older turns are compacted.
memory.summary-max-tokens=1024

# Web research. Each provider below is keyless / token-free. Providers that need an instance or endpoint
# the machine cannot reach degrade gracefully (the agent simply uses whichever providers responded).
# DuckDuckGo HTML/Lite (no API key, works out of the box).
web.search.duckduckgo-url=https://html.duckduckgo.com/html/
web.search.duckduckgo-lite-url=https://lite.duckduckgo.com/lite/
# SearXNG JSON API. Point this at your own (or a public) instance; blank disables the provider.
web.search.searxng-url=https://searx.be
web.search.searxng-enabled=true
# Firecrawl keyless search endpoint (best-effort; disable if it rejects keyless calls).
web.search.firecrawl-url=https://api.firecrawl.dev/v1/search
web.search.firecrawl-enabled=false
# You.com keyless search endpoint (best-effort).
web.search.youcom-url=https://api.you.com/public/search
web.search.youcom-enabled=false
# Per-provider result cap and HTTP limits.
web.search.max-results=5
web.search.timeout-seconds=20
web.search.max-response-bytes=1048576

# Research loop controls.
# Max number of search queries issued per research attempt.
research.max-queries=4
# Max research attempts before answering with whatever was gathered (re-search on insufficient info).
research.max-attempts=3
# Max clarifying questions to ask before researching with the best understanding of the topic.
research.max-clarifications=3
# Max characters of gathered web evidence injected into a single synthesis prompt (keeps the prompt
# within the token budget). ~4 chars per token, so 16000 chars is roughly 4000 tokens of evidence.
research.max-evidence-chars=16000

# Skills. Stored on disk as markdown files; the "research" skill is bootstrapped on first run by searching
# the web for research best practices and synthesizing a skill from them.
skills.dir=skills

# These llama-server settings intentionally match roleflow (same model and runtime).
llama.manage-server=true
llama.binary=
llama.profile=small
llama.hf-model=
llama.model-path=
llama.alias=qwen2.5-3b-instruct
llama.host=0.0.0.0
llama.port=8081
llama.client-host=127.0.0.1
llama.ctx-size=0
llama.gpu-layers=-1
llama.threads=0
llama.parallel=1
llama.extra-args=
llama.auto-restart=true
llama.health-interval-seconds=15
llama.cache-prompt=true
llama.cache-reuse=256
llama.draft-hf-model=
llama.draft-model-path=
llama.draft-tokens=16
llama.draft-gpu-layers=-1
